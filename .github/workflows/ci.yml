name: Climate Intelligence CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings
          flake8 src/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Run data pipeline
        run: python src/data_pipeline.py

      - name: Run forecasting
        run: python src/forecasting.py

      - name: Run risk model
        run: python src/risk_model.py

      - name: Run anomaly detection
        run: python src/anomaly_detection.py

      - name: Run narrative generation
        run: python src/narrative_gen.py

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Verify outputs
        run: |
          echo "=== Output Files ==="
          ls -la outputs/
          echo "=== Row Counts ==="
          wc -l outputs/*.csv
